version: '3.8'

services:
  oprisa-clear-crm:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: oprisa-clear-crm
    ports:
      - "${FRONTEND_PORT:-3050}:80"
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: oprisa-clear-crm-backend
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - attachments_data:/app/attachments
    restart: unless-stopped
    # If deploying to Coolify with Traefik later, you can add Traefik labels here
    # similar to your oprisa ultimate crm project, but for now this exposes port 3050.

volumes:
  attachments_data:
    name: oprisa-clear-crm-attachments
